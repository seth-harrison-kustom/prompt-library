const prompts = [

  // ── GET TO KNOW CLAUDE ──
  { section:"Get to Know Claude", title:"Talk to me about something you know cold", platforms:["claude"], cowork:false, attach:false, tool:"Claude",
    prompt:`I'm new to Claude and want to understand how this works by talking about something I actually know. Pick a topic I care about: [describe it — a sport, team, hobby, outdoor activity, food, music, anything you follow closely]. Tell me something genuinely interesting about it that most people don't know, then ask me a question about my own experience or opinion so we can actually go back and forth. I know this subject well, so if you get something wrong I'll tell you — that's part of what I want to see. After your response, add a section called "Where we could take this:" with three specific next moves in this conversation — not generic options, but real follow-ups based on exactly what you just said.` },

  { section:"Get to Know Claude", title:"Take a side — I'll push back if you're wrong", platforms:["claude"], cowork:false, attach:false, tool:"Claude",
    prompt:`I want to see what it feels like to disagree with Claude. Here's my take on something I know well: [share a strong opinion, hot take, or conviction — about sports, food, your industry, anything you feel confident about]. Push back on me. Take the other side with real conviction — don't just say "that's a great point, but." I know this subject, so weak arguments won't hold up and I'll tell you. After your pushback, add a section called "Where we could take this:" with three specific next moves — like pulling up data that supports one side, steelmanning my position, or finding the middle ground we'd both actually land on.` },

  { section:"Get to Know Claude", title:"See if Claude can connect what I tell it", platforms:["claude"], cowork:false, attach:false, tool:"Claude",
    prompt:`I want to test how Claude uses context across a conversation. Here are three real things about me: [share three genuine things — a team you follow, somewhere you've lived, something you do on weekends, something you're good at, a place that matters to you]. Now give me a specific recommendation — a book, a place to visit, something to watch, something to try — that genuinely connects at least two of those three things in a way that makes sense for who I am. Not a generic suggestion. Explain exactly why it fits. After your recommendation, add a section called "Where we could take this:" with three specific next moves that build on what you now know about me — and at least one of them should be something I could use at work.` },

  { section:"Get to Know Claude", title:"Build a writing skill from your own sent emails", platforms:["m365","claude"], cowork:false, attach:false, tool:"Claude + M365 connector",
    prompt:`I want to build a personal writing skill that captures my communication style. Use the M365 connector to pull my sent emails from the last 6 months from Outlook. Read through them fully before drawing any conclusions — I want the analysis grounded in what's actually there, not a quick scan.

Phase 1 — Share what you found, then ask me about it.

Once you've read the emails, tell me what you observed: how I open and close, how my tone shifts across different audiences (internal kustom.us addresses vs. external customers, adjusters, and vendors), what my sentence patterns look like, and any consistent habits or signatures in how I write. Frame these as observations, not conclusions.

Then ask me a few questions before we go further — does this match how I see myself? Are there communication contexts or relationships that don't show up in email but matter to how I work? Is there anything I'd want to sound more or less like going forward? Anything that feels off about what you found?

Do not draft the skill document until we've had that conversation.

Phase 2 — Build the skill document.

Once we've talked it through, incorporate both what you found in the emails and what I told you in our conversation, and draft my personal voice skill in this structure:

# [My Name] — Writing & Communication Style Guide
[One paragraph: who I am, my role, who I write to regularly]

## Voice & Tone
[Specific observations grounded in evidence — not adjectives. "Opens with the action, never with pleasantries" not just "direct."]

## What I Never Write
[Actual phrases from the evidence, or phrases conspicuously absent]

## Sentence-Level Patterns
[Length habits, punctuation tells, structural patterns]

## By Audience
[How my writing actually shifts — internal vs. external, peers vs. leadership vs. direct reports]

## Opening and Closing Patterns
[What my emails actually start and end with — real examples]

Close with one paragraph: what's the most interesting thing you found, and what pattern might I not have noticed about myself?

After the full document, add a section called "Where we could take this:" with three specific next moves — like refining a section that doesn't feel right, testing the skill by drafting something real right now, or saving this as a skill I can use in every future Claude conversation.` },

  { section:"Get to Know Claude", title:"Help me work through a real decision", platforms:["claude"], cowork:false, attach:false, tool:"Claude",
    prompt:`I want to see how Claude works as a thinking partner on something real — not a work task, just something I'm actually sitting with. Here's a decision I'm trying to make or a situation I'm trying to figure out: [describe it — could be personal, professional, low-stakes or high, doesn't matter]. Don't give me an answer right away. First, ask me the two or three questions that would actually change your recommendation if the answer were different. Then, once I've answered, give me your honest take — including the thing I probably don't want to hear if there is one. After your response, add a section called "Where we could take this:" with three specific next moves — like pressure-testing the decision, thinking through what happens if I'm wrong, or turning the conclusion into something I could actually act on this week.` },

  // ── 6SoS & DPI ANALYSIS ──
  { section:"6SoS & DPI Analysis", title:"Weekly 6SoS read — find my highest-leverage DPI action", platforms:["kidd","claude"], cowork:false, attach:true, tool:"Claude + 6SoS Workbook + KIDD exports",
    prompt:`I'm a General Manager at Kustom US running a weekly 6 Signs of Success (6SoS) read. I need you to analyze my division's performance and find the single highest-leverage action I can take this week to move my Divisional Performance Index (DPI). All six signs carry equal weight (Backlog, Production, GP%, Ops Efficiency, Cash Conversion, Cash Collections), so the lever with the biggest movable variance wins.

Week ending: [MM/DD/YY]
Division: [XXX]
My current DPI: [XX.XX%]

Three required attachments (do not proceed without all three):
- 6SoS Workbook (emailed weekly)
- KIDD AR Detail (AR Details page, pg 9, Consolidated KPIs Intacct — export or screenshot)
- KIDD WIP (WIP Details page, pg 5, Consolidated KPIs Intacct — export or screenshot)

Your analysis must do all of the following — in this order:

1. Rank the six signs by variance from goal. Pull actuals, goals, and % of goal for Backlog, Production (Earned $), GP%, Ops Efficiency ($/HC), Cash Conversion (UB+AR as % of TTM), Cash Collections (AR>90 as % of TTM) from the Detailed Calculation tab. Identify the two weakest. Show the raw dollar gaps — not just percentages.

2. For each weak sign, go mechanical — not metric. Do not stop at "AR>90 is high." Open the detail tabs and answer:
Cash Collections weak? In the AR Detail file, which customers carry the biggest >90 balances, how many days past due, and which Super / RSS / Coordinator owns them? Are balances concentrated in one property type or one customer?
GP weak? In the GP% Calc Detail tab, which Project Director owns the largest book and what's their weighted GP? Which specific closed jobs ran underwater or <10%? Is it concentrated in one category (Rebuild vs. Mit) or one property type?
Cash Conversion weak? Is it driven by UB or AR? Where is the UB sitting by Dash Status in the WIP file?
Production weak? What's in Pre-Production backlog vs. WIP vs. stuck? Any WIP jobs with Est Complete in the past that haven't moved to CWP/AR?
Ops Efficiency weak? Is the SG&A headcount stable and is Earned $/HC below goal because of HC bloat or Earned $ shortfall?
Backlog weak? How far below goal, and is there a Pre-Production pipeline to close the gap?

3. Cross-reference the AR Detail and WIP files to find shared-customer patterns — this is the step most analysts skip.
Which customers appear in BOTH the AR>90 list AND the WIP "Completed without Paperwork" / "Invoice Pending" / "Waiting for Final Closure" buckets?
If the same customer has aged AR AND open paperwork on your side on the same or related jobs, the collections problem is actually a close-out/paperwork problem. You cannot collect on a prior invoice when the customer is still owed final docs, a COC, a final walk, or a signed scope change on the same job.
Quantify: $ of AR>90 tied to customers who also have open UB paperwork. This is the "unjammable" bucket that normal collection calls won't move.

4. Name the concentration. Roll up every stuck / aged / underbilled dollar by Superintendent and by Project Director. Is one person the common thread across multiple weak signs? Surface that explicitly.

5. Surface the stale-WIP anomalies. List any job where:
Dash Status = "Work in Progress" AND Est Complete is > 30 days in the past
Dash Status = "Completed without Paperwork" AND Est Complete is > 60 days in the past
Completion % >= 80% AND Total Underbillings > $10K
These are frozen revenue — call out by job number, customer, Super, and $.

6. Recommend ONE highest-leverage play for the week. The recommendation must include:
The mechanical reframe (what is actually jammed vs. what the surface metric suggests)
Specific job numbers and customer names — not categories
Which system the work happens in (KIDD for strategy/planning, DASH for project/paperwork, Intacct for financial posting)
Named owner on my team (Superintendent, Coordinator, Project Director, RSS — by role and by name from the files)
Specific outcome measured in dollars by Friday
Conservative DPI math: if we move $X, the sign goes from Y% to Z%, contributing +N points to DPI. Round down.

Rules: Do not recommend "call customers to collect faster." The recommendation must identify a mechanical root cause. Do not pad. Name real people and real job numbers. Flag any subtotal/rollup rows and exclude from job-level analysis. Show the DPI math.

Deliverable: Concise prose with a small table only if it clarifies the shared-customer cross-reference. End with: Reframe -> What/Where/Who -> Result by Friday -> DPI impact.` },

  { section:"6SoS & DPI Analysis", title:"Pull my KIDD AR Detail for 6SoS analysis", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Navigate to the Kustom Core Reporting workspace and open the Consolidated KPIs Intacct report — this is the only report with live data. Navigate to the AR Details page (page 9 in the tab bar). Set the Region/Division slicer to [your division — e.g. 99-08 for N. Seattle]. This report refreshes daily around 7 PM and shows current Intacct data. Read the full AR aging table and report: every customer with an AR balance over 90 days old, their balance, days past due, job number, and the Superintendent and Coordinator assigned. Sort by balance descending. This is the KIDD AR Detail I need to attach to my 6SoS analysis prompt. Do not modify any data.` },

  { section:"6SoS & DPI Analysis", title:"Pull my KIDD WIP for 6SoS analysis", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Navigate to the Kustom Core Reporting workspace and open the Consolidated KPIs Intacct report. Navigate to the WIP Details page (page 5 in the tab bar). Set the Region/Division slicer to [your division]. This page is pre-filtered to REPORT_STATUS = WIP. Read the full WIP schedule and report: every job with its contract value, billed to date, underbilling or overbilling amount, Superintendent, Coordinator, and DASH status. Flag any job where underbilling exceeds $5,000 — those need immediate invoicing. Flag any job where Est Complete is in the past and status is still Work in Progress. This is the KIDD WIP I need to attach to my 6SoS analysis prompt. Do not modify any data.` },

  // ── KIDD / POWER BI REPORTING ──
  { section:"KIDD / Power BI Reporting", title:"Spotlight — my division KPI snapshot", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Navigate to the Kustom Core Reporting workspace and open the Consolidated KPIs Intacct report — do not use the App or the standalone Consolidated KPIs report, both are frozen at January 2026. Navigate to the Spotlight page (page 1). Before reading anything, set the Region/Division slicer to [your division name or code]. This report refreshes daily around 7 PM from Intacct and shows current data. Read and report all KPI tiles: AR Balance and AR % of TTM Revenue, Backlog, Total Contract, Total Earned, WIP Jobs count, Full Cycle Days, and any collections or underbilling figures shown. Note which tiles show blank — those modules aren't yet reporting for your division.` },

  { section:"KIDD / Power BI Reporting", title:"AR aging — outstanding balances by job", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report in the Kustom Core Reporting workspace. Navigate to AR Summary (page 8). Set Region/Division to [your division]. Click your division row to drill through to AR Details (page 9). Read the full aging table — list every invoice by aging bucket: current, 1-30, 31-60, 61-90, and 91+ days. Flag everything in the 61+ columns. Show job name, customer, invoice amount, days aged, and Superintendent/Coordinator. Sort by balance descending within each bucket. This report is live Intacct data. Do not modify anything.` },

  { section:"KIDD / Power BI Reporting", title:"WIP schedule — underbillings and overbillings", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report. Navigate to WIP Details (page 5). Set Region/Division to [your division]. This page is pre-filtered to active WIP jobs. Read the WIP schedule and report: every job's contract value, billed to date, and underbilling or overbilling amount. Flag any underbilling over $5,000 — those need invoicing immediately. Flag any job where Superintendent or Coordinator is blank. Optionally filter by Superintendent to isolate one PD's book. Do not modify any data.` },

  { section:"KIDD / Power BI Reporting", title:"Cash position by division — current balance", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report. Navigate to Cash Position By Division (page 31). Use the Location slicer — note this uses Intacct's location field, not the standard Region/Division slicer — and filter to [your office location code, e.g. 99-08]. Read and report: job count, total contract, JTD collections, total cost, average completion percentage, and net cash position for your division. This page shows live Intacct data. Do not modify anything.` },

  { section:"KIDD / Power BI Reporting", title:"Completed jobs with negative cash position", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report. Navigate to Complete with Negative Cash Position (page 33). Use the Location slicer to filter to [your office location code]. This page shows completed jobs where collections are behind costs — these are jobs we've finished but haven't been paid on net. Read and report: every job in your division showing a negative cash position, with job name, contract value, total billed, total collected, and the cash position dollar amount. Sort by most negative first. These are your priority collections escalations. Do not modify anything.` },

  { section:"KIDD / Power BI Reporting", title:"MTD billing vs. AOP target — are we on pace?", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report. Navigate to MTD Billing vs Target (page 30). Set Region/Division to [your division]. Confirm the Accounting Date slicer is set to This Month. Read and report: MTD billing total, the AOP daily revenue target, and whether we are ahead or behind pace for the month. The chart shows billing vs. target by day — tell me the gap in dollars and whether the trend line is improving or falling behind. This is live Intacct data.` },

  { section:"KIDD / Power BI Reporting", title:"Underbilling by job — what needs invoicing now", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report. Navigate to Job Underbillings Selected (page 24). Set Region/Division to [your division]. This page is pre-filtered to WIP status jobs. Read the full underbilling list and report: every job with an underbilling balance, the dollar amount, Superintendent, and Coordinator. Sort by underbilled amount descending. Flag anything over $5,000 — those need immediate invoicing or a documented reason in DASH. Do not modify any data.` },

  { section:"KIDD / Power BI Reporting", title:"Low margin jobs — watchlist", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report. Navigate to Low Margin Job Details (page 7). Set Region/Division to [your division]. This page is pre-filtered to WIP jobs. Read the watchlist — list every job showing below the margin threshold with job name, Estimator, Superintendent, and the margin percentage. These are jobs I need to have a plan on before they close underwater. Do not modify anything.` },

  { section:"KIDD / Power BI Reporting", title:"Collections pace — this week vs. goal", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report. Navigate to Collections by Division (page 14). Set Region/Division to [your division]. Read and report: total collections this week, the weekly goal, and whether we are ahead or behind. Then navigate to Collections Summary (page 13) and drill down on the date chart to see day-by-day activity. Tell me the trend — are we collecting consistently or in bursts? Do not modify anything.` },

  { section:"KIDD / Power BI Reporting", title:"Pending sales pipeline — live count by office", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report. Navigate to Pending Sales Dashboard (page 32). Set the Region/Division slicer to [your division]. The default date range is 1/1/2025 through today. Read and report: total pending job count for your division, total estimated value if shown, and any detail visible in the table below the chart — job numbers, customer names, RSS, and status. This is live Intacct data refreshed daily. Do not modify anything.` },

  // ── GM/PD ONE-ON-ONE ──
  { section:"GM / PD One-on-One", title:"Pull my KIDD Production Report for 1:1 prep", platforms:["kidd"], cowork:true, attach:false, tool:"Consolidated KPIs Intacct via Cowork",
    prompt:`Open Power BI at app.powerbi.com. Open the Consolidated KPIs Intacct report. Navigate to the Job Report page (page 6). Set Region/Division to [your division]. Filter the Superintendent field to [PD Name] — at Kustom the Superintendent field corresponds to the Project Director. Read the full job list for this PD and export or note all columns: Job #, Job Name, Status, Target Completion Date, Estimate value, Total Invoiced, AR Balance, and any underbilling. This is the KIDD Production Report I need to attach to my 1:1 prep prompt. Do not modify any data.` },

  { section:"GM / PD One-on-One", title:"Build my structured 1:1 agenda from the Production Report", platforms:["kidd","claude"], cowork:false, attach:true, tool:"Claude + KIDD Production Report",
    prompt:`I'm preparing for my weekly 1-on-1 with [PD NAME], who is our Project Director.

Required attachment: KIDD Production Report (Job Report page, filtered to this PD's jobs)

Scope filter: Include ONLY jobs where Supervisor = "[PD NAME]". Ignore every other job.

Structure the output top-to-bottom in this exact order:

Title row: "Weekly 1:1 — [PD NAME] | [today's date] | 30 min"
Subtitle stats row: PD job count, total estimated value, total AR balance, total underbilled

Section 1 — Jobs Past Target Completion (7 min): Active-status jobs with a Target Completion Date already passed. Columns: Job #, Job Name, Status, Target, Days Late, Estimate. Sort by most overdue first.

Section 2 — AR / Slow-Pay Concerns (8 min): Jobs where (Total Invoiced minus Total Collected) >= $5,000. Columns: Job #, Job Name, Status, Days Aged, AR Balance. Sort by AR Balance descending.

Section 3 — Underbilling > $5K (8 min): Jobs in Work in Progress / Invoice Pending / Completed without Paperwork / Waiting for Final Closure where (Total Estimates minus Total Invoiced) > $5,000 and Total Estimates > 0. Columns: Job #, Job Name, Status, Estimate, Invoiced, Underbilled. Sort by Underbilled descending.

Section 4 — Jobs Below 35% Gross Margin (4 min): Jobs with Working Gross Profit % < 35% and Total Job Cost > $1,000. Columns: Job #, Job Name, Status, Estimate, Job Cost, Working GP%. Sort by lowest GP first.

Section 5 — Unresolved Items from Last Week (3 min): Empty tracker with 5 blank rows. Columns: #, Item, Owner, Status, Due, Notes.

  execTags.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "filter-btn fb-" + t.value + (activeExec === t.value ? " active" : "");
    btn.textContent = t.label;
    btn.onclick = () => { activeExec = t.value; render(); };
    ef.appendChild(btn);
  });
}

function renderContextNote() {
  const wrap = document.getElementById("context-note-wrap");
  const note = contextNotes[activePlatform] || (activeExec === "attach" ? contextNotes["attach"] : "");
  wrap.innerHTML = note ? `<div class="context-note">${note}</div>` : "";
}

function matchesFilter(p) {
  const pMatch = activePlatform === "all" || p.platforms.includes(activePlatform);
  const eMatch = activeExec === "all" ||
    (activeExec === "cowork" && p.cowork && !p.attach) ||
    (activeExec === "attach" && p.attach) ||
    (activeExec === "no-extra" && !p.cowork && !p.attach);
  const sMatch = !searchVal || p.title.toLowerCase().includes(searchVal) || p.prompt.toLowerCase().includes(searchVal) || p.section.toLowerCase().includes(searchVal);
  return pMatch && eMatch && sMatch;
}

function render() {
  renderFilters(); renderContextNote();
  const lib = document.getElementById("library");
  lib.innerHTML = ""; let total = 0;
  sections.forEach(sec => {
    const matching = prompts.filter(p => p.section === sec && matchesFilter(p));
    if (!matching.length) return;
    total += matching.length;
    const secEl = document.createElement("div"); secEl.className = "section";
    const label = document.createElement("div"); label.className = "section-label";
    label.textContent = sec; secEl.appendChild(label);
    const grid = document.createElement("div"); grid.className = "prompt-grid";
    matching.forEach((p, idx) => {
      const id = sec + idx;
      const card = document.createElement("div"); card.className = "prompt-card";
      const top = document.createElement("div"); top.className = "card-top";
      const titleEl = document.createElement("div"); titleEl.className = "card-title"; titleEl.textContent = p.title;
      const tagsEl = document.createElement("div"); tagsEl.className = "card-tags";
      p.platforms.forEach(t => {
        const span = document.createElement("span"); span.className = "tag tag-" + t;
        const labels = { dash:"DASH", kidd:"KIDD", adp:"ADP", m365:"M365", claude:"Claude", xa:"XA", alacrity:"Alacrity" };
        span.textContent = labels[t] || t; tagsEl.appendChild(span);
      });
      if (p.cowork) { const cw = document.createElement("span"); cw.className = "tag tag-cowork"; cw.textContent = "Cowork"; tagsEl.appendChild(cw); }
      if (p.attach) { const at = document.createElement("span"); at.className = "tag tag-attach"; at.textContent = "Attach Files"; tagsEl.appendChild(at); }
      top.appendChild(titleEl); top.appendChild(tagsEl);
      const promptEl = document.createElement("div");
      promptEl.className = "card-prompt" + (expandedCards.has(id) ? " expanded" : "");
      promptEl.textContent = '"' + p.prompt + '"';
      const bottom = document.createElement("div"); bottom.className = "card-bottom";
      const toolEl = document.createElement("div"); toolEl.className = "card-tool"; toolEl.textContent = p.tool;
      const btnGroup = document.createElement("div"); btnGroup.className = "btn-group";
      const expandBtn = document.createElement("button"); expandBtn.className = "expand-btn";
      expandBtn.textContent = expandedCards.has(id) ? "collapse" : "expand";
      expandBtn.onclick = e => { e.stopPropagation(); if (expandedCards.has(id)) expandedCards.delete(id); else expandedCards.add(id); render(); };
      const copyBtn = document.createElement("button"); copyBtn.className = "copy-btn"; copyBtn.textContent = "copy";
      copyBtn.onclick = e => { e.stopPropagation(); navigator.clipboard.writeText(p.prompt).then(() => { copyBtn.textContent = "copied!"; copyBtn.classList.add("copied"); setTimeout(() => { copyBtn.textContent = "copy"; copyBtn.classList.remove("copied"); }, 1800); }); };
      btnGroup.appendChild(expandBtn); btnGroup.appendChild(copyBtn);
      bottom.appendChild(toolEl); bottom.appendChild(btnGroup);
      card.appendChild(top); card.appendChild(promptEl); card.appendChild(bottom);
      grid.appendChild(card);
    });
    secEl.appendChild(grid); lib.appendChild(secEl);
  });
  document.getElementById("count").textContent = total + " prompt" + (total !== 1 ? "s" : "");
  if (total === 0) lib.innerHTML = '<div class="empty">No prompts match your search.</div>';
}

render();
document.getElementById("search").addEventListener("input", e => { searchVal = e.target.value.toLowerCase(); render(); });
</script>
</body>
</html>
