<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kustom GM Prompt Library v8</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem 1rem; }
.container { max-width: 960px; margin: 0 auto; }
.header { padding-bottom: 1.25rem; border-bottom: 1px solid #e5e5e0; margin-bottom: 1.5rem; }
.header-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
.header h1 { font-size: 22px; font-weight: 600; }
.badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; background: #f0f0ec; color: #666; border: 1px solid #e0e0da; }
.vbadge { font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 20px; background: #FAEEDA; color: #854F0B; border: 1px solid #EF9F27; }
.header p { font-size: 13px; color: #666; line-height: 1.5; }
.filter-group { margin-bottom: 0.6rem; }
.filter-group-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #bbb; margin-bottom: 5px; }
.filters { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 0.4rem; }
.filter-btn { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; border: 1px solid #ddd; background: transparent; color: #555; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
.filter-btn:hover { background: #f0f0ec; }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: transparent; }
.filter-btn.active.fb-dash { background: #0C447C; }
.filter-btn.active.fb-intacct { background: #854F0B; }
.filter-btn.active.fb-xa { background: #3C3489; }
.filter-btn.active.fb-alacrity { background: #993C1D; }
.filter-btn.active.fb-adp { background: #085041; }
.filter-btn.active.fb-m365 { background: #3B6D11; }
.filter-btn.active.fb-claude { background: #555; }
.filter-btn.active.fb-cowork { background: #1a1a1a; }
.filter-btn.active.fb-powerbi { background: #5b21b6; }
.search-wrap { margin-bottom: 1.25rem; }
.search-wrap input { width: 100%; font-size: 13px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; }
.search-wrap input:focus { outline: none; border-color: #aaa; }
.context-note { font-size: 11px; color: #666; background: #f5f5f0; border: 1px solid #e5e5e0; border-radius: 8px; padding: 8px 12px; margin-bottom: 1.25rem; line-height: 1.6; }
.section { margin-bottom: 1.5rem; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #e5e5e0; }
.prompt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; }
.prompt-card { border: 1px solid #e5e5e0; border-radius: 12px; padding: 14px 16px; background: #fff; transition: border-color 0.12s, background 0.12s; }
.prompt-card:hover { border-color: #ccc; background: #fafaf8; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-title { font-size: 13px; font-weight: 600; color: #1a1a1a; line-height: 1.4; }
.card-tags { display: flex; gap: 3px; flex-wrap: wrap; flex-shrink: 0; }
.tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 20px; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.03em; }
.tag-dash { background: #E6F1FB; color: #0C447C; }
.tag-intacct { background: #FAEEDA; color: #854F0B; }
.tag-xa { background: #EEEDFE; color: #3C3489; }
.tag-alacrity { background: #FAECE7; color: #993C1D; }
.tag-adp { background: #E1F5EE; color: #085041; }
.tag-powerbi { background: #f0e8ff; color: #5b21b6; }
.tag-m365 { background: #EAF3DE; color: #3B6D11; }
.tag-claude { background: #f0f0ec; color: #444; }
.tag-cowork { background: #1a1a1a; color: #fff; }
.card-prompt { font-size: 12px; color: #555; line-height: 1.55; font-style: italic; border-left: 2px solid #e0e0da; padding-left: 10px; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-prompt.expanded { -webkit-line-clamp: unset; }
.card-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-tool { font-size: 11px; color: #aaa; font-style: italic; }
.btn-group { display: flex; gap: 6px; }
.copy-btn { font-size: 11px; font-weight: 500; padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: transparent; color: #555; cursor: pointer; transition: all 0.12s; }
.copy-btn:hover { background: #f0f0ec; }
.copy-btn.copied { color: #3B6D11; border-color: #3B6D11; background: #EAF3DE; }
.expand-btn { font-size: 11px; color: #999; background: none; border: none; cursor: pointer; padding: 0; }
.expand-btn:hover { color: #555; }
.empty { text-align: center; padding: 2rem; color: #999; font-size: 13px; }
.count-label { font-size: 12px; color: #999; margin-bottom: 0.75rem; }
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="header-top">
    <h1>GM Prompt Library</h1>
    <span class="badge">Kustom US</span>
    <span class="vbadge">v8</span>
  </div>
  <p>Example prompts for Claude Enterprise + Cowork. Filter by platform or execution type, expand any card for the full prompt, copy and adapt.</p>
</div>
<div class="search-wrap">
  <input type="text" id="search" placeholder="Search — collections, altitude, XA action items, PTO, one-on-one..." />
</div>
<div style="margin-bottom:1.25rem;">
  <div class="filter-group">
    <div class="filter-group-label">Platform</div>
    <div class="filters" id="platform-filters"></div>
  </div>
  <div class="filter-group">
    <div class="filter-group-label">Execution</div>
    <div class="filters" id="exec-filters"></div>
  </div>
</div>
<div id="count" class="count-label"></div>
<div id="context-note-wrap"></div>
<div id="library"></div>
</div>
<script>
const prompts=[{section:"Financial & Collections",title:"Collections status — all open jobs past 30 days",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH and pull all open jobs where the invoice date is more than 30 days ago and payment has not been received. List them with job number, job name, invoice date, invoice amount, and last AR note starting with "AR$:". Sort by oldest invoice first.`},{section:"Financial & Collections",title:"AR aging by job — 60+ day accounts",platforms:["intacct"],cowork:true,tool:"Intacct Sockeye via Cowork",prompt:`Open Sage Intacct and go to Sockeye > AR Aging by Grouping. Set the grouping to Job. Filter Location to [your location ID — e.g. 99-08 for Seattle]. Set aging buckets to show 0, 1-30, 31-60, 61-90, and 91+ days. Run the report. List every job with an amount in the 61-90 or 91+ bucket. Show job name, customer, amount outstanding, and aging bucket. Do not modify any data.`},{section:"Financial & Collections",title:"Prep my weekly A/R collections meeting",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`I have my weekly A/R Collections Meeting today. Go into DASH and pull all open invoices by coordinator. For each PC, show me: total outstanding, number of invoices past 30 days, past 60 days, and any jobs flagged in a note as needing escalation. Organize it by PC so I can run through it coordinator by coordinator.`},{section:"Financial & Collections",title:"Cash collected vs. invoiced — this month",platforms:["intacct"],cowork:true,tool:"Intacct via Cowork",prompt:`Open Sage Intacct and go to Accounts Receivable > Invoices Analysis Report. Set the reporting period to the current month. Filter Location to [your location ID]. Under "Show documents" select All. Run the report and tell me: total invoiced this month, total fully received, total partially received, and total not yet received. Do not modify any data.`},{section:"Financial & Collections",title:"Find jobs with no cash movement this month",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`In DASH, find all active jobs that have had no payment received in the last 30 days. Show me job name, PC, current balance owed, and the last AR note logged. I want to know which jobs are completely stalled on collections.`},{section:"Financial & Collections",title:"Underbilling — jobs completed but not invoiced",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Pull a list of all jobs in DASH where work has been completed or is substantially complete, but no invoice has been sent yet. Show the job name, date of majority completion if entered, PC assigned, and contract value. Flag any that have been sitting unbilled for more than 2 weeks.`},{section:"Financial & Collections",title:"Draft a collections follow-up email",platforms:["claude"],cowork:false,tool:"Claude",prompt:`Write a professional but firm collections follow-up email to a homeowner/adjuster. The invoice for [job name] was sent on [date] for $[amount] and we have not received payment. We have called twice and left voicemails. Keep it firm, professional, and focused on getting a response and a payment timeline. Don't be aggressive.`},{section:"Financial Reporting — Intacct & Sockeye",title:"WIP report — underbilled/overbilled by job",platforms:["intacct"],cowork:true,tool:"Intacct Sockeye via Cowork",prompt:`Open Sage Intacct and navigate to Sockeye > Work in Progress. Set the As Of Date to today. Filter Location to [your location ID — e.g. 99-16 for Tampa]. Set Status to Active. Run the report. List all jobs and their WIP position — show job name, contract value, billed to date, and whether each job is underbilled or overbilled and by how much. Do not modify any data. Note: this report only reflects periods where a WIP schedule has been posted.`},{section:"Financial Reporting — Intacct & Sockeye",title:"Customer aging report — my office",platforms:["intacct"],cowork:true,tool:"Intacct via Cowork",prompt:`Open Sage Intacct and go to Accounts Receivable > Customer Aging Report. Set Report As Of to today. Filter Location to [your location ID]. Set Report Type to Detail. Set aging buckets to 0 / 1-30 / 31-60 / 61-90 / 91+. Run the report. Show me every customer with an outstanding balance broken out by aging bucket. Flag anyone in the 61+ columns. Do not modify any data.`},{section:"Financial Reporting — Intacct & Sockeye",title:"Schedule of values — billing vs. completion",platforms:["intacct"],cowork:true,tool:"Intacct Sockeye via Cowork",prompt:`Open Sage Intacct and go to Sockeye > Schedule of Values. Filter to Location [your location ID] and Status Active. Run the report. For each job show the contract value, amount billed to date, percentage complete, and remaining balance to bill. Flag any jobs with significant unbilled completion — those are the ones to invoice immediately. Do not modify any data.`},{section:"Financial Reporting — Intacct & Sockeye",title:"Project estimate vs. actual cost",platforms:["intacct"],cowork:true,tool:"Intacct Sockeye via Cowork",prompt:`Open Sage Intacct and go to Sockeye > Project Estimate vs Actual Cost. Filter to Location [your location ID] and Status Active. Run the report — note this report can be slow, apply a tighter job filter if it times out. For each job show: estimated cost, actual cost to date, variance, and percentage of budget consumed. Flag any jobs where actual cost has exceeded the estimate or is within 10% of it. Do not modify any data.`},{section:"Financial Reporting — Intacct & Sockeye",title:"Job invoice history — full billing trail",platforms:["intacct"],cowork:true,tool:"Intacct via Cowork",prompt:`Open Sage Intacct and go to Jobs > Invoices > View. Filter by job name or job ID: [job name or number]. Show me all invoices on this job — invoice number, date, amount, and payment status. I want to see the full billing history and whether there are any unpaid invoices. Do not modify any data.`},{section:"Financial Reporting — Intacct & Sockeye",title:"Weekly budget review — margin by job",platforms:["intacct"],cowork:true,tool:"Intacct Sockeye via Cowork",prompt:`Open Sage Intacct and go to Sockeye > Project Estimate vs Actual Cost. Filter Location to [your location ID], Status Active. Run the report. Flag any jobs where actual costs have exceeded the estimate or where remaining margin looks tight. Then cross-reference those job names against DASH to pull the latest JOB UPDATE: note and PD assigned. Do not modify any data.`},{section:"XactAnalysis SP",title:"My office action items — what's overdue right now",platforms:["xa"],cowork:true,tool:"XactAnalysis SP via Cowork",prompt:`Open XactAnalysis SP. First confirm the office selector in the top center shows [your office name] — if not, switch it before proceeding. Navigate to All Action Items. Read the full list. Tell me: total number of open action items, how many are overdue (showing a red day count), and list every overdue item with its claim number, action type, due date, and how many days late it is. Sort by most days late first. Do not click any action buttons or mark anything complete.`},{section:"XactAnalysis SP",title:"In Progress — jobs with no estimate returned",platforms:["xa"],cowork:true,tool:"XactAnalysis SP via Cowork",prompt:`Open XactAnalysis SP. Confirm the office selector shows [your office name]. Navigate to In Progress. Add the "Days Pending" column if it isn't already showing — click the Columns button and enable it. Set the date filter to Last 365 Days. Read the full list and tell me: total jobs in progress, and list any jobs where Days Pending is over 30, sorted by most days pending first. Show claim number, policyholder name, date received, days pending, and carrier program. Do not modify any records.`},{section:"XactAnalysis SP",title:"Look up a specific claim",platforms:["xa"],cowork:true,tool:"XactAnalysis SP via Cowork",prompt:`Open XactAnalysis SP. Confirm the office selector shows [your office name]. Navigate to Search. Enter claim number [claim number] in the Claim # field. Run the search. Open the result and tell me: current XactAnalysis status, workflow status (customer contacted, inspection date, job sold/started/completed), adjuster name and email, type of loss, coverage limits and deductible, any open action items on this job, and the count of attached notes and documents. Do not take any action or submit anything.`},{section:"XactAnalysis SP",title:"Action items by carrier program",platforms:["xa"],cowork:true,tool:"XactAnalysis SP via Cowork",prompt:`Open XactAnalysis SP. Confirm the office selector shows [your office name]. Navigate to All Action Items. Scan the list and identify all items tied to [carrier program name — e.g. Mercury - Sedgwick Repair]. List those action items — claim number, action type, due date, and days late. Tell me how many are overdue and what the most common action type is. Do not modify any records.`},{section:"XactAnalysis SP",title:"Assignment activity — this month's throughput",platforms:["xa"],cowork:true,tool:"XactAnalysis SP via Cowork",prompt:`Open XactAnalysis SP. Confirm the office selector shows [your office name]. Navigate to Reports > Activity Reports. Select Report Type: Assignment Activity. Set the Sender to All. Set the date range From to the first of this month and To to today. Run the report. Tell me: total assignments received this month, total returned, and how many are still in progress. Do not modify any data.`},{section:"XactAnalysis SP",title:"Estimate aging — where jobs are stalling",platforms:["xa"],cowork:true,tool:"XactAnalysis SP via Cowork",prompt:`Open XactAnalysis SP. Confirm the office selector shows [your office name]. Navigate to Reports > Activity Reports. Select Report Type: Assignment Aging. Set Sender to All. Set date range to the last 90 days. Run the report. Tell me which stage jobs are sitting at longest on average and flag any outliers significantly over average cycle time. Do not modify any data.`},{section:"Alacrity — AlacNET",title:"Homepage triage — issues, comments and red light check",platforms:["alacrity"],cowork:true,tool:"AlacNET via Cowork",prompt:`Open AlacNET at em.alacrity.net. First check for the red banner at the top of the page — if it appears, that means one or more offices are blocked from receiving new assignments. Click the 'here' link in the banner and document which office(s) are on red light and whether there is a reason logged or if it is score-driven. Then read the homepage dashboard and report every counter: Issues Past Due, Issues Assigned to You, Reminders (past due, today, future), Comments (requested response recipient, requested response originator, unread assignment comments, carbon copy comments), and New Assignments. Tell me which counters are non-zero and what each one means I need to do. Do not click any action buttons or submit anything.`},{section:"Alacrity — AlacNET",title:"Response Requests — what Alacrity is asking me to respond to",platforms:["alacrity"],cowork:true,tool:"AlacNET via Cowork",prompt:`Open AlacNET at em.alacrity.net. Navigate to Assignments > RR - Recipient. This is the queue of formal Response Requests where Alacrity is waiting on a reply from me. List every open RR — show claim number, insured name, carrier, which office it belongs to, who sent the request, and what they are asking for. These are the highest-priority communication items on the platform — an unanswered RR escalates. Do not respond to or action any item.`},{section:"Alacrity — AlacNET",title:"Unread claim comments",platforms:["alacrity"],cowork:true,tool:"AlacNET via Cowork",prompt:`Open AlacNET at em.alacrity.net. Navigate to Assignments > Claim Comment. List every unread comment — show claim number, insured name, which office, who sent the comment, the date, and the comment text or subject. Tell me whether any of these comments appear to require a formal response vs. informational only. Do not reply to or action any comment.`},{section:"Alacrity — AlacNET",title:"Active assignments — all offices, current workflow step",platforms:["alacrity"],cowork:true,tool:"AlacNET via Cowork",prompt:`Open AlacNET at em.alacrity.net. Navigate to Assignments > Active. Read the active work order list. For each assignment visible, show claim number, insured name, carrier, handling office, and current workflow step. Flag any assignments that appear to be stuck in an early workflow step (On Hold, Contractor Estimating) for an extended period — those are the ones at risk of SLA misses. Do not modify any records.`},{section:"Alacrity — AlacNET",title:"CIP score check — all offices",platforms:["alacrity"],cowork:true,tool:"AlacNET via Cowork",prompt:`Open AlacNET at em.alacrity.net. Navigate to Contract Info > CIP. This is the CIP Dashboard showing performance scores for all Kustom offices. For each office listed, read and report: total CIP score, and any individual metrics that are failing or at risk — specifically the estimate submission within 24 hours rate (target >80%), re-submission within 24 hours of rejection (target >85%), and contact with insured within 30 minutes (target >95%). Flag any office with a CIP score of 0 — that means no concluded claims in the current measurement period, which will cause a red light block. Do not modify any data.`},{section:"Alacrity — AlacNET",title:"Open Detail Report — assignment aging by office",platforms:["alacrity"],cowork:true,tool:"AlacNET via Cowork",prompt:`Open AlacNET at em.alacrity.net. Navigate to Report > Report Dashboard > Open Detail Report. Filter by Office to [your office name]. Set the date range to the last 90 days. Run the report. For each assignment showing, note the claim number, current workflow step, and how long it has been at that step. Flag any claims sitting in the same workflow step for more than 14 days — those are the bottlenecks. Do not modify any data.`},{section:"Alacrity — AlacNET",title:"Credentialing expiration check — C&C portal",platforms:["alacrity"],cowork:true,tool:"AlacNET via Cowork",prompt:`Open AlacNET at em.alacrity.net. Click the C&C link in the top header to open the Credentialing & Contracting portal at cnc.alacrity.net. Read the dashboard summary — report: number of active contractors, items expiring next month, any new credentialing items pending. If items are expiring next month, note how many and flag that renewals need to be initiated immediately — expired credentials can result in contractor suspension or office de-certification. Do not modify any data.`},{section:"Alacrity — AlacNET",title:"CBS outstanding invoices — what Alacrity owes us",platforms:["alacrity"],cowork:true,tool:"AlacNET via Cowork",prompt:`Open AlacNET at em.alacrity.net. Navigate to CBS > Outstanding Invoices. Read the full list of open invoices. For each invoice show: claim number, invoice amount, invoice date, and how many days it has been outstanding. Flag any invoices past 30 days — those should be followed up with Alacrity Accounting at 866-953-3220 x6. Do not modify any records.`},{section:"Alacrity — AlacNET",title:"Reinspections — vendor report",platforms:["alacrity"],cowork:true,tool:"AlacNET via Cowork",prompt:`Open AlacNET at em.alacrity.net. Navigate to Reinspections > Vendor Report. List all active reinspection assignments — show claim number, insured name, office, reinspection status, assigned inspector, and how long the reinspection has been open. Reinspections signal a quality dispute on the original estimate — flag any that have been open more than 30 days without resolution. Do not modify any records.`},{section:"Power BI Reporting",title:"Spotlight — office KPI snapshot",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI and navigate to the Kustom Core Reporting app (find it under Recommended or Apps in the left nav). It will open the Consolidated KPIs 2024 report at the Spotlight page. Before reading anything, set the Region/Division slicer to [your office name] — the default shows company-wide data. Once filtered, read and report the following KPI tiles: AR % of TTM Revenue and AR Balance, Under/(Over) % of TTM Revenue and balance, Total Sales YTD, WIP Jobs count, Rebuild Win Rate, Mitigation Win Rate, Mit to Rebuild Conversion, Full Cycle Days, Backlog, Total Contract, Total Earned. Note: this data is sourced from Sage and was last refreshed January 9, 2026. Use it for trend context, not current-state decisions.`},{section:"Power BI Reporting",title:"Live cash position — today's numbers by office",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI. Navigate to the Kustom Core Reporting workspace and open the "Consolidated KPIs Intacct" report — this is different from the app or the standard Consolidated KPIs report. Navigate to the "Cash Position By Division" page tab. Use the Location slicer to filter to [your office location code — e.g. 99-08 for Seattle]. Read and report the cash balance shown. This page pulls live data from Intacct and was last refreshed today — it is the only Power BI page that shows current cash figures.`},{section:"Power BI Reporting",title:"Live pending sales pipeline by office",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI. Navigate to the Kustom Core Reporting workspace and open the "Consolidated KPIs Intacct" report. Navigate to the "Pending Sales Dashboard" page tab. Set the Region/Division slicer to [your office]. The date range defaults to 1/1/2025 through mid-April 2026 — adjust if needed. Read and report: the count of pending jobs for your office from the bar chart, and any detail visible in the table below. This page pulls live Intacct data refreshed today.`},{section:"Power BI Reporting",title:"AR aging — outstanding balances by job",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI and open the Kustom Core Reporting app. Navigate to the AR Summary page. Set Region/Division to [your office]. Then set the Aging Date Parameter to today's date — the default is 9/30/2024 which will show stale data. Read the aging summary. Then click on your division row to drill through to AR Details for the line-item view. Show me: total AR balance, breakdown by aging bucket (current, 30, 60, 90+ days), and flag any individual invoices in the 60+ day buckets. Note the Sage data freeze date of January 9, 2026 — these figures reflect balances as of that date.`},{section:"Power BI Reporting",title:"WIP schedule — underbillings and overbillings",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI and open the Kustom Core Reporting app. Navigate to the WIP Details page. Set Region/Division to [your office]. Optionally filter by Estimator or Superintendent if you want to isolate a specific person's jobs. Read the WIP schedule and report: which jobs are underbilled (we've done work but haven't invoiced it), which are overbilled, and the dollar amounts for each. Flag any underbilling over $5,000 — those should be invoiced immediately.`},{section:"Power BI Reporting",title:"Month-to-date billing vs. AOP target",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI. Navigate to the Kustom Core Reporting workspace and open the standalone "Consolidated KPIs" report (not the app). Navigate to the "MTD Billing vs Target" page tab. Set Region/Division to [your office]. Confirm the Accounting Date is set to This Month. Read and report: MTD billing total, the AOP daily target, and whether we are ahead or behind pace for the month. This is one of the few pages where the Sage data freeze matters less — billing targets are calculated from prior year revenue divided by working days.`},{section:"Power BI Reporting",title:"Low margin jobs — watchlist",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI and open the Kustom Core Reporting app. Navigate to the Low Margin Job Details page. Set Region/Division to [your office]. Read the watchlist — list every job showing below the margin threshold, the job name, estimator, superintendent, and the margin percentage shown. These are the jobs I need to have a plan on. Optionally filter by Estimator or Superintendent to assign accountability context.`},{section:"Power BI Reporting",title:"Win rate by estimator",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI and open the Kustom Core Reporting app. Navigate to the Win Rate Summary page. Set Region/Division to [your office]. Filter by Type to isolate Rebuild or Mitigation — run each separately. Read the estimator-level win rate table and report each estimator's win rate. Click on an estimator row to drill through to Win Rate Detail for their individual job-level win/loss breakdown. Use the Won/Lost/Pending slicer to isolate lost jobs and look for patterns.`},{section:"Power BI Reporting",title:"Collections pace — this week vs. goal",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI and open the Kustom Core Reporting app. Navigate to the Collections by Division page. Set Region/Division to [your office]. The Activity Date defaults to Last 1 Week — confirm this is showing the current week. Read and report: total collections this week, the weekly goal, and whether we are ahead or behind. Then navigate to Collections Summary and drill down on the date to see day-by-day activity for the week.`},{section:"Power BI Reporting",title:"Invoiced by Division — daily billing pace",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI and open the Kustom Core Reporting app. Navigate to the Invoiced by Division page. Set Region/Division to [your office]. Set the Accounting Date slicer to "This Month." Read the chart and tell me: what is the daily billing pace vs. the daily target line, are we tracking ahead or behind for the month, and what is the total invoiced to date this month.`},{section:"Power BI Reporting",title:"Lifecycle details — how long are jobs taking",platforms:["powerbi"],cowork:true,tool:"Power BI via Cowork",prompt:`Open Power BI and open the Kustom Core Reporting app. Navigate to the Lifecycle Details page. Set Region/Division to [your office]. The date defaults to This Year (1/1-12/31/2026). Filter by Type to see Rebuild and Mitigation separately. Read and report: average days from job received to started, from started to major complete, and the full cycle average. Flag any stages where the average is significantly longer than expected — those are the bottlenecks in our job flow.`},{section:"Notes & Activity Analysis",title:"Jobs with no JOB UPDATE in the last 7 days",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Filter the date range to the last 7 days. Filter the note text to contain "JOB UPDATE:". Get the list of job numbers that have a recent JOB UPDATE note. Then go to the active jobs list and find all active jobs that are NOT in that list — those are the jobs that have gone 7+ days without a status update. List them by job name, status, and PD assigned. These are my blind spots.`},{section:"Notes & Activity Analysis",title:"All AR$ payment notes this month",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set the date range to the current month. Filter note text to contain "AR$:". List every note that appears — show job number, job name, the note text, who entered it, and the date. I want a full picture of every payment logged this month and what was collected.`},{section:"Notes & Activity Analysis",title:"Jobs stuck at EST UPLOADED with no EST APPROVED",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set the date range to the last 90 days. Search for notes containing "EST UPLOADED:". Get the job numbers from those results. Then search for "EST APPROVED:" in the same date range and get those job numbers. Show me the jobs that have an EST UPLOADED note but no EST APPROVED note — those estimates are sitting with the carrier unresolved. List them with job name, office, and the date of the last EST UPLOADED note.`},{section:"Notes & Activity Analysis",title:"SALES UPDATE activity — last 2 weeks",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set the date range to the last 14 days. Filter note text to contain "SALES UPDATE:". List every result — show job number, job name, who wrote the note, note date, and the first line of the note text. I want to see where active sales follow-up is happening and where it's silent.`},{section:"Notes & Activity Analysis",title:"Jobs flagged ON HOLD or NEED INFO",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set the date range to the last 60 days. Search first for notes containing "ON HOLD:" and list those jobs. Then search for "NEED INFO:" and list those jobs. For each, show job name, who wrote the note, the date, and the note text. I want to know what's stuck and why.`},{section:"Notes & Activity Analysis",title:"HAND OFF notes — jobs ready for production",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set the date range to the last 30 days. Filter note text to contain "HAND OFF:". List all results — show job number, job name, who wrote the HAND OFF note, and the date it was entered. These are jobs where the estimate was approved and vendor exchange is complete — they should be in production. Cross-reference against the active job list and flag any that are still showing a pre-production status.`},{section:"Notes & Activity Analysis",title:"INVOICE SENT — confirm billing went out",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set the date range to the last 30 days. Filter note text to contain "INVOICE SENT:". List every result with job number, job name, who logged it, and the date. Then check whether any of those jobs still show an outstanding balance — invoice sent doesn't always mean invoice paid. Flag any where the balance is still open.`},{section:"Notes & Activity Analysis",title:"Open supplement pipeline — SUP NEEDED and SUP IP",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set the date range to the last 90 days. Search for notes containing "SUP NEEDED:" and "SUP IP:" — run each search separately and combine the results. List the jobs that appear, the most recent supplement note for each, who wrote it, and the date. I want to see the full open supplement pipeline and flag anything sitting without movement.`},{section:"Notes & Activity Analysis",title:"JNS notes — not sold jobs this month",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set the date range to the current month. Filter note text to contain "JNS:". List every result — show job number, job name, who logged it, the date, and the full note text. I want to review why jobs were marked not sold and look for patterns in the reasons.`},{section:"Job Pipeline & Production",title:"Full active job pipeline",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH and pull all currently active jobs. For each job show: job number, job name, type (MIT or RECON), PD assigned, target completion date, current status, and last note date. Sort by target completion date ascending so I can see what's coming due first.`},{section:"Job Pipeline & Production",title:"Jobs at risk of missing target completion",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`In DASH, find all active RECON jobs where the target completion date is within the next 14 days. For each, show me the job name, PD, target date, and the last progress note. Flag any where the last note is more than 5 days old — those are the ones I'm most worried about.`},{section:"Job Pipeline & Production",title:"Prep my GM/PD one-on-one",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`I have my weekly one-on-one with [PD Name] in 30 minutes. Pull all jobs currently assigned to them from DASH. For each job show: job name, target completion date, current cash standing, any open invoices, and the most recent job note. Flag anything that looks like it needs my attention — overdue dates, stalled collections, or no recent notes.`},{section:"Job Pipeline & Production",title:"Summarize one-on-one and send follow-up email",platforms:["claude","m365"],cowork:true,tool:"Claude + Outlook via Cowork",prompt:`Here are my notes from my PD one-on-one with [PD Name] today: [paste notes or describe discussion]. Summarize the key decisions made and draft a brief follow-up email to [PD Name] that lists all action items, who owns each one, and the deadline. Keep it tight — this is an executive-level summary, not a recap of everything we talked about.`},{section:"Job Pipeline & Production",title:"MIT jobs still open past 30 days",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Pull all mitigation jobs in DASH that are still listed as active and were opened more than 30 days ago. Show me job name, open date, current status, PD/tech assigned, and last note. Any MIT job this old needs to either be closed or I need to understand why it's still open.`},{section:"Job Pipeline & Production",title:"Missing or overdue DASH documentation",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`In DASH, find all active jobs that are missing any of the following: (1) a note in the last 7 days, (2) an uploaded Work Authorization, (3) a target completion date. List them by job and show what's missing. I want to close these documentation gaps before they become problems.`},{section:"Job Pipeline & Production",title:"PD workload distribution check",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`In DASH, show me all active jobs grouped by PD. For each PD, give me a count of jobs, total contract value, and any jobs past their target completion date. I want to see if workload is distributed evenly or if anyone is overloaded.`},{section:"Job Pipeline & Production",title:"Plan my job site visits for the week",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Based on my active job list in DASH, help me prioritize which job sites I should visit this week. I have roughly [X] hours available for site visits. Flag jobs that: (1) haven't had a JOB UPDATE: note in more than 5 days, (2) are within 2 weeks of target completion, (3) have a customer satisfaction concern noted. List them ranked by priority with the most urgent first.`},{section:"Pending Sales & Business Development",title:"Full pending sales report",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Pull the Pending Sales report from DASH. Show all leads and pending jobs that don't yet have a signed Work Authorization or Construction Agreement. For each one show: job name, lead date, RSS assigned, last "SALES UPDATE:" note, and current status. Sort by lead date oldest first.`},{section:"Pending Sales & Business Development",title:"Pending jobs with no SALES UPDATE in 4+ days",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Filter the last 4 days and search for "SALES UPDATE:". Get the job numbers that appear. Then pull the full pending jobs list and show me every pending job NOT in that group — those are the ones where the RSS has gone silent. Show job name, lead date, and RSS assigned.`},{section:"Pending Sales & Business Development",title:"Jobs lost this month — reason summary",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set the date range to the current month. Filter note text to contain "JNS:". List the job name, date lost, RSS, and the reason documented in the note. I want to see if there's a pattern in why we're losing work.`},{section:"Pending Sales & Business Development",title:"Referral source lead conversion — last 90 days",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`In DASH, pull all leads received in the last 90 days. Group them by insurance carrier or referral source. For each source show: how many leads came in, how many converted to a signed WA, how many were lost (JNS: note), and how many are still pending. I want to know which referral relationships are converting and which ones aren't.`},{section:"Pending Sales & Business Development",title:"Draft a customer follow-up for a stalled job",platforms:["claude"],cowork:false,tool:"Claude",prompt:`Write a customer follow-up message for a RECON job that has been pending for [X] days. The estimate has been submitted to the insurance adjuster and we're waiting on approval. The customer is [describe their concern or mood if known]. The tone should be professional, reassuring, and keep momentum going without being pushy. End with a clear next step.`},{section:"Pending Sales & Business Development",title:"Log a SALES UPDATE note in DASH",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH, find job [job name or number], and add a new note with the header "SALES UPDATE:" followed by this update: [describe what happened — call attempt, objection raised, next step agreed on, etc.]. Make sure it's logged under my name today.`},{section:"Pending Sales & Business Development",title:"Build my BD outreach plan for the week",platforms:["claude"],cowork:false,tool:"Claude",prompt:`Help me build a BD outreach plan for this week. My goals are to strengthen relationships with existing referral sources and identify 2-3 new contacts to reach. I have about [X] hours for outreach. Suggest a structure for the week — who to call, who to visit in person, and what to say to re-engage someone I haven't talked to in a while.`},{section:"Team Management & Communications",title:"Things to Do — alerts and pending tasks",platforms:["adp"],cowork:true,tool:"ADP via Cowork",prompt:`Open ADP Workforce Now. Click "Things to Do" in the top navigation bar. First check the Tasks tab — list any open tasks, who they're for, what's required, and the due date. Then check the Notifications tab — open Urgent first and list every urgent item. Then open Regular notifications and tell me: how many unread, and are any of them real action items vs. automated training-overdue spam. I want to know what actually needs my attention right now.`},{section:"Team Management & Communications",title:"Team calendar — PTO and coverage gaps next 4 weeks",platforms:["adp"],cowork:true,tool:"ADP via Cowork",prompt:`Open ADP Workforce Now and navigate to My Team > Team Calendar. Make sure you are on the "My Team" view, not "My Calendar." The calendar loads the current week by default — use the left/right week arrows to navigate forward. Check this week plus the next 3 weeks (4 weeks total). Important: the calendar uses virtual row rendering, meaning not all team members are visible at once. Before reading any data each week, scroll the calendar container all the way down to force every employee row to load, then scroll back up and read from the top. Do this for each week you navigate to. For every Time Off block you find, record: employee name, status (green = approved, yellow = pending and still needs my action, grey = denied, teal = unpaid PTO), date(s), and hours. Flag any yellow blocks specifically — those are pending requests waiting on my approval. Flag any week where 2 or more people are out simultaneously — those are my coverage risk windows. Note: this calendar shows your specific team members and their time off only. Hire date anniversary markers may not appear reliably in the near-term window — use the My Team Tenure report for anniversary planning instead.`},{section:"Team Management & Communications",title:"Pending time off approvals",platforms:["adp"],cowork:true,tool:"ADP via Cowork",prompt:`Open ADP Workforce Now and navigate to My Team > Time Off > List of Requests. Check the Pending Requests tab. List every request waiting for my approval — employee name, dates requested, hours, and time off policy type. Then navigate to the Request History tab and check for any recent requests I may have missed. I want to make sure nothing is sitting unanswered.`},{section:"Team Management & Communications",title:"Upcoming work anniversaries — tenure report",platforms:["adp"],cowork:true,tool:"ADP via Cowork",prompt:`Open ADP Workforce Now and navigate to Reports & Analytics > My Team Reports. Find and run the "My Team Tenure" report. Set the date scope to Year-to-Date or the next 90 days if that option is available. Export or read the results. For each employee, show their name, hire date, and length of service. Identify anyone hitting a 1st, 2nd, 5th, or 10th work anniversary in the next 60 days — those are milestone moments worth recognizing.`},{section:"Team Management & Communications",title:"Time off balance summary — who has large accruals",platforms:["adp"],cowork:true,tool:"ADP via Cowork",prompt:`Open ADP Workforce Now and navigate to Reports & Analytics > My Team Reports. Find and run the "My Team Time Off Balance Summary" report. Set the scope to all active employees. Read the results and tell me: which employees have the largest accrued PTO balances, and which employees have used little or no time off this year. Large unused balances are a risk — both operationally and financially.`},{section:"Team Management & Communications",title:"Headcount check — roster and status verification",platforms:["adp"],cowork:true,tool:"ADP via Cowork",prompt:`Open ADP Workforce Now and navigate to My Team > Team Dashboard. The roster shows both active and terminated employees by default — terminated employees appear with a pink status pill. Count and list all Active employees only (ignore the terminated rows). Confirm the total active headcount and note any positions that look unexpected based on what you know. Then check the Employment tab for any recent hire dates or status changes. Do not modify any records.`},{section:"Team Management & Communications",title:"Performance review task status — overdue check",platforms:["adp"],cowork:true,tool:"ADP via Cowork",prompt:`Open ADP Workforce Now and click "Things to Do" in the top navigation. Go to the History tab. Look for any performance review feedback tasks marked as Overdue. List every employee with an overdue review task, the review cycle name, and the original due date. Then check the Tasks tab for any active review tasks still in the pending window. I want a full picture of where performance reviews stand — what's complete, what's overdue, and what's still coming due.`},{section:"Team Management & Communications",title:"Check required meetings are on the calendar",platforms:["m365"],cowork:true,tool:"Outlook via Cowork",prompt:`Look at my Outlook calendar for the next two weeks. Confirm that I have all of the following scheduled: (1) weekly one-on-one with each PD, (2) A/R collections meeting, (3) any required leadership/corporate calls. List what's there and flag what's missing.`},{section:"Team Management & Communications",title:"Send my one-on-one follow-up email",platforms:["claude","m365"],cowork:true,tool:"Claude + Outlook via Cowork",prompt:`Using Outlook, draft and send a follow-up email to [PD/PC name] after our one-on-one today. Subject: "One-on-One Follow-Up — [Date]". Body: list the action items we discussed, who owns each one, and the deadline. Keep it short. CC me.`},{section:"Team Management & Communications",title:"Draft a performance coaching note",platforms:["claude"],cowork:false,tool:"Claude",prompt:`Help me write a documented coaching note for [team member role]. The issue is [describe the performance gap — e.g. DASH notes not being updated, missed customer follow-ups, late to meetings]. I need to document this privately in a way that's clear, fair, and factual. It should reference the expectation, describe what's been observed, and state what needs to change.`},{section:"Team Management & Communications",title:"Draft a team-wide office update",platforms:["claude"],cowork:false,tool:"Claude",prompt:`Write a brief all-office update for my team covering: (1) any process or SOP reminders they need to hear this week, (2) a performance callout or win worth recognizing, (3) one focus area I want everyone prioritizing. Keep it direct, energizing, and under 200 words. Don't make it feel like a corporate memo.`},{section:"Team Management & Communications",title:"Draft a work anniversary recognition message",platforms:["claude"],cowork:false,tool:"Claude",prompt:`Write a brief, genuine work anniversary recognition message for [employee name] who is hitting their [1st / 2nd / 5th / 10th] anniversary with Kustom on [date]. Keep it warm and specific to the milestone — don't make it sound generic. Acknowledge what they bring to the team. Under 100 words, conversational, not corporate.`},{section:"Team Management & Communications",title:"Staff development — identify training gaps",platforms:["claude"],cowork:false,tool:"Claude",prompt:`Based on what I've observed, I want to think through development gaps on my team. Here's what I'm seeing: [describe 2-3 patterns — e.g. DASH notes inconsistent, PD struggling with collections conversations, new PC slow on invoicing]. Help me identify the root cause for each and suggest a concrete coaching or development approach.`},{section:"Reporting & Insights",title:"Altitude dashboard — office status snapshot",platforms:["dash"],cowork:true,tool:"DASH Altitude via Cowork",prompt:`Open DASH and navigate to Dashboards > Altitude. Set the Office filter to [your office name]. Set the Time Frame to This Month. Read the KPI tiles and report: Open Jobs count and balance owing, Pending Sales count and total estimate value, Work in Progress count and balance owing, Accounts Receivable count and balance owing, Jobs Lacking Interaction count and dollar exposure. Tell me which bucket has the most dollar exposure and which has the most jobs.`},{section:"Reporting & Insights",title:"Altitude — Jobs Lacking Interaction deep dive",platforms:["dash"],cowork:true,tool:"DASH Altitude via Cowork",prompt:`Open DASH > Dashboards > Altitude. Set Office filter to [your office]. Set Time Frame to This Month. Click on the "Jobs Lacking Interaction" tile to drill into the job list. For each job shown, note the job name, status bucket, total estimate value, balance owing, and last activity date. Sort by balance owing descending. These are active jobs with money on the table and no recent movement.`},{section:"Reporting & Insights",title:"Weekly office performance snapshot",platforms:["dash"],cowork:true,tool:"DASH Altitude via Cowork",prompt:`Open DASH > Dashboards > Altitude. Set Office to [your office] and Time Frame to This Week. Read the full KPI tile set and report: Open Jobs, Pending Sales, Pre Production, Work in Progress, Completed Without Paperwork, Invoice Pending, Accounts Receivable, and Waiting to Close — count and balance owing for each. Then go to Journal Notes > All Notes, filter this week, and tell me how many total notes were logged and which note headers appeared most frequently.`},{section:"Reporting & Insights",title:"Altitude — prior month vs. this month comparison",platforms:["dash"],cowork:true,tool:"DASH Altitude via Cowork",prompt:`Open DASH > Dashboards > Altitude. Set Office to [your office]. First set Time Frame to Prior Month and record the KPI tile values: Open Jobs, AR count and balance, Gross Profit total invoiced and collected. Then switch Time Frame to This Month and capture the same values. Compare the two and tell me: where are we trending better, where are we trending worse, and what's the biggest gap I should be focused on.`},{section:"Reporting & Insights",title:"Month-to-date revenue and collections",platforms:["intacct"],cowork:true,tool:"Intacct via Cowork",prompt:`Open Sage Intacct > Accounts Receivable > Invoices Analysis Report. Set period to current month. Filter Location to [your location ID]. Under "Show documents" select All. Pull: total invoiced MTD, total fully collected, total partially collected, and total outstanding. Cross-reference with DASH Altitude to add job count context. Do not modify any data.`},{section:"Reporting & Insights",title:"Deductibles not yet collected",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Find all active RECON jobs in DASH where the deductible has not been collected and invoiced. Show job name, PD, contract value, and estimated deductible amount if noted. These are dollars we should already have in hand.`},{section:"Reporting & Insights",title:"Supplements and change orders pending approval",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Go to DASH > Journal Notes > All Notes. Set date range to the last 90 days. Search for "SUP UPLOADED:" and "CO SENT:" notes — run each separately. List all jobs that appear, the date of the last upload/submission note, and whether a corresponding "SUP APPROVED:" or approval note exists. Flag any submitted more than 14 days ago with no approval note — those need a follow-up call to the adjuster.`},{section:"Reporting & Insights",title:"Google review solicitation — recently closed jobs",platforms:["dash"],cowork:true,tool:"DASH via Cowork",prompt:`Find all jobs closed in the last 60 days in DASH. For each one, check the notes for any mention of a Google review request. List the jobs where no review solicitation appears in the notes — those are missed opportunities. Include job name, PD, and close date so I can prioritize follow-up outreach.`},{section:"Reporting & Insights",title:"Leadership prep — 3-minute office update",platforms:["claude","dash"],cowork:true,tool:"DASH Altitude + Claude via Cowork",prompt:`I have a leadership call in [X hours]. Open DASH > Dashboards > Altitude, set Office to [your office] and Time Frame to This Month. Read the KPI tiles and note: total open jobs, total AR balance owing, Pending Sales pipeline value, Jobs Lacking Interaction count and dollar exposure, and any jobs in the Completed Without Paperwork bucket. Then help me turn that into a tight 3-minute verbal update — lead with the wins, flag the risks, state what I'm doing about each one.`}];

const sections=[...new Set(prompts.map(p=>p.section))];
const platformTags=[{value:"all",label:"All"},{value:"dash",label:"DASH"},{value:"intacct",label:"Intacct"},{value:"xa",label:"XactAnalysis"},{value:"alacrity",label:"Alacrity"},{value:"adp",label:"ADP"},{value:"powerbi",label:"Power BI"},{value:"m365",label:"M365 / Outlook"},{value:"claude",label:"Claude only"}];
const execTags=[{value:"all",label:"All"},{value:"cowork",label:"Cowork required"},{value:"no-cowork",label:"No browser needed"}];
const contextNotes={intacct:"<strong>Location IDs for Intacct:</strong> SEA 99-08 / TAC 99-09 / JAX 99-07 / TPA 99-16 / MCO 99-17 / RDU 99-20 / CLT 99-21 / ATL 99-04 / SDF 99-22 / DET 99-32 / IND 99-33 / AZO 99-35 / FWA 99-36 / PHX 99-72 / TUS 99-70 / SAC 99-81 / FAI 99-82 / SAN 99-83 / LGB 99-84. Not sure of yours? Ask your regional director.",xa:"<strong>XactAnalysis tip:</strong> Always confirm your office is selected in the company dropdown at the top center before reading any data — it does not auto-scope to your location.",powerbi:"<strong>Power BI tips:</strong> (1) <strong>Always set Region/Division first</strong> — every report defaults to 'All' which shows company-wide data, not your office. (2) <strong>Sage data is frozen at January 9, 2026</strong> — approximately 3.5 months old. Do not make current-state decisions from these numbers. (3) <strong>For live/current data</strong>, use the Consolidated KPIs Intacct report — the Cash Position By Division and Pending Sales Dashboard pages refresh daily from Intacct. (4) <strong>AR Aging date default is 9/30/2024</strong> — always change this to today before reading any AR page or the numbers will be nearly 18 months stale.",alacrity:"<strong>AlacNET tips:</strong> (1) The red banner at the top of every page signals one or more offices are blocked from new assignments — always check this first. (2) Assignments > RR - Recipient is the highest-priority queue — unanswered Response Requests escalate automatically. (3) CIP scores are based on concluded claims only — in-progress claims do not count toward metrics. (4) The C&C credentialing portal (cnc.alacrity.net) is a separate system from the main AlacNET platform — access it via the C&C link in the header.",adp:"<strong>ADP tips:</strong> (1) ADP requires a fresh login every session — if you land on a login screen, log in at workforcenow.adp.com first, then re-run the prompt. (2) The Team Calendar uses virtual row rendering — Cowork must scroll through all rows to capture the full team list. (3) The roster shows Active AND Terminated employees by default — look for the pink status pill and ignore those rows. (4) Hire date anniversary markers may not appear in the near-term calendar window — use the My Team Tenure report instead."};
let activePlatform="all",activeExec="all",searchVal="";
const expandedCards=new Set();
function renderFilters(){const pf=document.getElementById("platform-filters");const ef=document.getElementById("exec-filters");pf.innerHTML="";ef.innerHTML="";platformTags.forEach(t=>{const btn=document.createElement("button");btn.className="filter-btn fb-"+t.value+(activePlatform===t.value?" active":"");btn.textContent=t.label;btn.onclick=()=>{activePlatform=t.value;render();};pf.appendChild(btn);});execTags.forEach(t=>{const btn=document.createElement("button");btn.className="filter-btn fb-"+t.value+(activeExec===t.value?" active":"");btn.textContent=t.label;btn.onclick=()=>{activeExec=t.value;render();};ef.appendChild(btn);});}
function renderContextNote(){const wrap=document.getElementById("context-note-wrap");wrap.innerHTML=contextNotes[activePlatform]?`<div class="context-note">${contextNotes[activePlatform]}</div>`:"";}
function matchesFilter(p){const pMatch=activePlatform==="all"||p.platforms.includes(activePlatform);const eMatch=activeExec==="all"||(activeExec==="cowork"&&p.cowork)||(activeExec==="no-cowork"&&!p.cowork);const sMatch=!searchVal||p.title.toLowerCase().includes(searchVal)||p.prompt.toLowerCase().includes(searchVal)||p.section.toLowerCase().includes(searchVal);return pMatch&&eMatch&&sMatch;}
function render(){renderFilters();renderContextNote();const lib=document.getElementById("library");lib.innerHTML="";let total=0;sections.forEach(sec=>{const matching=prompts.filter(p=>p.section===sec&&matchesFilter(p));if(!matching.length)return;total+=matching.length;const secEl=document.createElement("div");secEl.className="section";const label=document.createElement("div");label.className="section-label";label.textContent=sec;secEl.appendChild(label);const grid=document.createElement("div");grid.className="prompt-grid";matching.forEach((p,idx)=>{const id=sec+idx;const card=document.createElement("div");card.className="prompt-card";const top=document.createElement("div");top.className="card-top";const titleEl=document.createElement("div");titleEl.className="card-title";titleEl.textContent=p.title;const tagsEl=document.createElement("div");tagsEl.className="card-tags";p.platforms.forEach(t=>{const span=document.createElement("span");span.className="tag tag-"+t;const labels={dash:"DASH",intacct:"Intacct",xa:"XA",adp:"ADP",m365:"M365",claude:"Claude",alacrity:"Alacrity",powerbi:"Power BI"};span.textContent=labels[t]||t;tagsEl.appendChild(span);});if(p.cowork){const cw=document.createElement("span");cw.className="tag tag-cowork";cw.textContent="Cowork";tagsEl.appendChild(cw);}top.appendChild(titleEl);top.appendChild(tagsEl);const promptEl=document.createElement("div");promptEl.className="card-prompt"+(expandedCards.has(id)?" expanded":"");promptEl.textContent='"'+p.prompt+'"';const bottom=document.createElement("div");bottom.className="card-bottom";const toolEl=document.createElement("div");toolEl.className="card-tool";toolEl.textContent=p.tool;const btnGroup=document.createElement("div");btnGroup.className="btn-group";const expandBtn=document.createElement("button");expandBtn.className="expand-btn";expandBtn.textContent=expandedCards.has(id)?"collapse":"expand";expandBtn.onclick=e=>{e.stopPropagation();if(expandedCards.has(id))expandedCards.delete(id);else expandedCards.add(id);render();};const copyBtn=document.createElement("button");copyBtn.className="copy-btn";copyBtn.textContent="copy";copyBtn.onclick=e=>{e.stopPropagation();navigator.clipboard.writeText(p.prompt).then(()=>{copyBtn.textContent="copied!";copyBtn.classList.add("copied");setTimeout(()=>{copyBtn.textContent="copy";copyBtn.classList.remove("copied");},1800);});};btnGroup.appendChild(expandBtn);btnGroup.appendChild(copyBtn);bottom.appendChild(toolEl);bottom.appendChild(btnGroup);card.appendChild(top);card.appendChild(promptEl);card.appendChild(bottom);grid.appendChild(card);});secEl.appendChild(grid);lib.appendChild(secEl);});document.getElementById("count").textContent=total+" prompt"+(total!==1?"s":"");if(total===0)lib.innerHTML='<div class="empty">No prompts match your search.</div>';}
render();document.getElementById("search").addEventListener("input",e=>{searchVal=e.target.value.toLowerCase();render();});
</script>
